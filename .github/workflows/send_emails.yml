name: Send Scheduled Emails
on:
  schedule:
    # Run at 9:00 AM, 10:00 AM, 11:00 AM, 12:00 PM, 1:00 PM, 3:00 PM ET
    # EDT (Mar-Nov) = UTC-4 → 13:00, 14:00, 15:00, 16:00, 17:00, 19:00 UTC
    # EST (Nov-Mar) = UTC-5 → 14:00, 15:00, 16:00, 17:00, 18:00, 20:00 UTC
    # Schedule both sets — the script checks actual ET time before sending
    - cron: "0 13 * * 1-5" # 9 AM EDT
    - cron: "0 14 * * 1-5" # 9 AM EST / 10 AM EDT
    - cron: "0 15 * * 1-5" # 10 AM EST / 11 AM EDT
    - cron: "0 16 * * 1-5" # 11 AM EST / 12 PM EDT
    - cron: "0 17 * * 1-5" # 12 PM EST / 1 PM EDT
    - cron: "0 18 * * 1-5" # 1 PM EST
    - cron: "0 19 * * 1-5" # 3 PM EDT
    - cron: "0 20 * * 1-5" # 3 PM EST
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  send-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: send-emails
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-send-emails-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-send-emails-

      - name: Install dependencies
        run: |
          pip install gspread oauth2client google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Set up credentials
        run: |
          mkdir -p .local
          echo '${{ secrets.GCP_CREDENTIALS }}' > .local/credentials.json
          echo '${{ secrets.GMAIL_CREDENTIALS }}' > .local/gmail_credentials.json
          echo '${{ secrets.GMAIL_TOKEN }}' | base64 -d > .local/gmail_token.pickle
          echo '${{ secrets.ENV_FILE }}' > .env

      - name: Check if within send window
        id: time_check
        run: |
          python3 -c "
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo('US/Eastern'))
          hour = now.hour
          # Only send between 9 AM and 4 PM ET (covers 3 PM send + buffer)
          if 9 <= hour <= 16:
              print('Within send window:', now.strftime('%I:%M %p ET'))
          else:
              print('Outside send window:', now.strftime('%I:%M %p ET'))
              exit(1)
          "

      - name: Send scheduled emails (with retry)
        if: steps.time_check.outcome == 'success'
        run: |
          python3 scripts/send_scheduled.py || \
          (echo "Retry 1 after 30s..." && sleep 30 && python3 scripts/send_scheduled.py) || \
          (echo "Retry 2 after 60s..." && sleep 60 && python3 scripts/send_scheduled.py)

      - name: Check for bounces
        if: steps.time_check.outcome == 'success'
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0, '.')
          try:
              from outreach.outreach_mailer import Mailer
              from outreach.outreach_data import Credits
              from outreach.bounce_scanner import BounceScanner
              ma = Mailer(Credits())
              svc = ma._service()
              bounced = BounceScanner.scan(svc, days_back=2)
              if bounced:
                  print(f'Found {len(bounced)} bounced emails')
              else:
                  print('No bounces detected')
          except Exception as e:
              print(f'Bounce check skipped: {e}')
          "

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Send Emails Failed — ${now}`,
              body: `The Send Scheduled Emails workflow failed.\n\n**Time:** ${now}\n**Run:** ${runUrl}\n\nCommon causes:\n- Gmail token expired (re-auth on Mac)\n- Google Sheets API rate limit\n- Credentials secret changed\n\nCheck the run logs for details.`,
              labels: ['automation-alert']
            });
