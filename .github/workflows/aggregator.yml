name: Run Aggregator

on:
  schedule:
    # Run every 6 hours: 5 AM, 11 AM, 5 PM, 11 PM ET
    # UTC: 10:00, 16:00, 22:00, 04:00
    - cron: '0 10 * * *'   # 5 AM ET
    - cron: '0 16 * * *'   # 11 AM ET
    - cron: '0 22 * * *'   # 5 PM ET
    - cron: '0 4 * * *'    # 11 PM ET
  workflow_dispatch:  # Manual trigger

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: aggregator
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
          pip install chromedriver-autoinstaller
          python3 -c "import chromedriver_autoinstaller; chromedriver_autoinstaller.install()"

      - name: Install dependencies
        run: |
          pip install -r requirements-local.txt

      - name: Set up credentials
        run: |
          mkdir -p .local
          echo '${{ secrets.GCP_CREDENTIALS }}' > .local/credentials.json
          echo '${{ secrets.GMAIL_CREDENTIALS }}' > .local/gmail_credentials.json
          echo '${{ secrets.GMAIL_TOKEN }}' | base64 -d > .local/gmail_token.pickle
          echo '${{ secrets.ENV_FILE }}' > .env

      - name: Run aggregator
        run: |
          python3 -m aggregator
        env:
          DISPLAY: ':99'

      - name: Summary
        if: always()
        run: |
          echo "Aggregator run completed at $(date -u '+%Y-%m-%d %H:%M UTC')"
