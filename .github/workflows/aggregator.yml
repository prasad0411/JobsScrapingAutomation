name: Run Aggregator

on:
  schedule:
    # Run every 6 hours: 5 AM, 11 AM, 5 PM, 11 PM ET
    - cron: '0 10 * * *'   # 5 AM ET
    - cron: '0 16 * * *'   # 11 AM ET
    - cron: '0 22 * * *'   # 5 PM ET
    - cron: '0 4 * * *'    # 11 PM ET
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: aggregator
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          CHROME_VERSION=$(google-chrome --version | awk '{print $3}' | cut -d. -f1)
          pip install webdriver-manager
          python3 -c "
          from webdriver_manager.chrome import ChromeDriverManager
          from webdriver_manager.core.os_manager import ChromeType
          path = ChromeDriverManager().install()
          print(f'ChromeDriver installed at: {path}')
          "

      - name: Install dependencies
        run: |
          pip install -r requirements-local.txt

      - name: Set up credentials
        run: |
          mkdir -p .local
          echo '${{ secrets.GCP_CREDENTIALS }}' > .local/credentials.json
          echo '${{ secrets.GMAIL_CREDENTIALS }}' > .local/gmail_credentials.json
          echo '${{ secrets.GMAIL_TOKEN }}' | base64 -d > .local/gmail_token.pickle
          echo '${{ secrets.ENV_FILE }}' > .env
          if [ -n "${{ secrets.JOBRIGHT_COOKIES }}" ]; then
            echo '${{ secrets.JOBRIGHT_COOKIES }}' > .local/jobright_cookies.json
            echo "Jobright cookies loaded"
          fi

      - name: Run aggregator
        run: |
          python3 -m aggregator
        env:
          DISPLAY: ':99'

      - name: Summary
        if: always()
        run: |
          echo "Aggregator run completed at $(date -u '+%Y-%m-%d %H:%M UTC')"
