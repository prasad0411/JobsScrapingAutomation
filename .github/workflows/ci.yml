name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pytest beautifulsoup4 requests dnspython gspread oauth2client msal pyyaml

      - name: Run tests
        run: pytest tests/ -v --tb=short
# 237 tests · Python 3.12 · pytest
